<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Display Student</h1>
       <table border="1">
        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Mobile</th>
            <th>Email</th>
            <th>Address</th>
            <th>Action</th>
        </tr>
    {% for i in mydata %}
    <tr>

        <td>{{i.id}}</td>
        <td>{{i.name}}</td>
        <td>{{i.mobile}}</td>
        <td>{{i.email}}</td>
        <td>{{i.address}}</td>
        <td><a href="delete-student/{{i.id}}">Delete</a></td>
    </tr>
    {% endfor %}
    </table>
</body>
